<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23" />
      <stop offset="100%" style="stop-color:#1a1a3e" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1" />
      <stop offset="100%" style="stop-color:#8b5cf6" />
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981" />
      <stop offset="100%" style="stop-color:#34d399" />
    </linearGradient>
    <linearGradient id="amber" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b" />
      <stop offset="100%" style="stop-color:#fbbf24" />
    </linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6366f1"/>
    </marker>
    <marker id="arr-dim" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#475569"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="480" rx="12" fill="url(#bg)"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" fill="#e2e8f0" font-size="26" font-weight="700">code2idea</text>
  <text x="400" y="58" text-anchor="middle" fill="#94a3b8" font-size="13">You bring the idea. It writes the code.</text>

  <!-- ═══ YOUR IDEA ═══ -->
  <rect x="30" y="85" width="150" height="60" rx="10" fill="none" stroke="url(#accent)" stroke-width="2"/>
  <text x="105" y="110" text-anchor="middle" fill="#c4b5fd" font-size="12" font-weight="600">YOUR IDEA</text>
  <text x="105" y="126" text-anchor="middle" fill="#94a3b8" font-size="10">"try attention gates"</text>

  <!-- Arrow to classify -->
  <line x1="180" y1="115" x2="218" y2="115" stroke="#6366f1" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ═══ CLASSIFY ═══ -->
  <!-- Diamond shape for decision -->
  <polygon points="295,85 370,115 295,145 220,115" fill="#1e1e3f" stroke="url(#amber)" stroke-width="1.5"/>
  <text x="295" y="112" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="600">CLASSIFY</text>
  <text x="295" y="124" text-anchor="middle" fill="#94a3b8" font-size="9">specific?</text>

  <!-- ═══ SPECIFIC PATH (top) ═══ -->
  <line x1="295" y1="85" x2="295" y2="55" stroke="#475569" stroke-width="1.5"/>
  <line x1="295" y1="55" x2="500" y2="55" stroke="#475569" stroke-width="1.5" marker-end="url(#arr-dim)"/>
  <text x="380" y="48" text-anchor="middle" fill="#64748b" font-size="10">specific → skip papers</text>

  <!-- ═══ EXPLORATORY PATH (right) ═══ -->
  <line x1="370" y1="115" x2="408" y2="115" stroke="#6366f1" stroke-width="2" marker-end="url(#arr)"/>
  <text x="388" y="108" fill="#64748b" font-size="9">exploratory</text>

  <!-- Papers box -->
  <rect x="410" y="90" width="120" height="50" rx="8" fill="#1e1e3f" stroke="#334155" stroke-width="1"/>
  <text x="470" y="110" text-anchor="middle" fill="#818cf8" font-size="10" font-weight="600">FIND PAPERS</text>
  <text x="470" y="124" text-anchor="middle" fill="#94a3b8" font-size="9">arXiv + WebSearch</text>

  <!-- Arrow papers to discuss -->
  <line x1="530" y1="115" x2="530" y2="115" stroke="#6366f1" stroke-width="2"/>
  <line x1="530" y1="115" x2="568" y2="115" stroke="#6366f1" stroke-width="2"/>

  <!-- Both paths merge at DISCUSS -->
  <!-- Specific path comes down -->
  <line x1="570" y1="55" x2="570" y2="90" stroke="#475569" stroke-width="1.5"/>

  <!-- ═══ DISCUSS ═══ -->
  <rect x="540" y="90" width="110" height="50" rx="8" fill="#1e1e3f" stroke="url(#amber)" stroke-width="2"/>
  <text x="595" y="110" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="600">DISCUSS</text>
  <text x="595" y="124" text-anchor="middle" fill="#94a3b8" font-size="9">confirm with user</text>

  <!-- Arrow to implement -->
  <line x1="650" y1="115" x2="688" y2="115" stroke="#6366f1" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ═══ IMPLEMENT ═══ -->
  <rect x="690" y="85" width="80" height="60" rx="8" fill="#1e1e3f" stroke="url(#accent)" stroke-width="2"/>
  <text x="730" y="110" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="600">IMPLEMENT</text>
  <text x="730" y="124" text-anchor="middle" fill="#94a3b8" font-size="9">Agent edits</text>

  <!-- ═══ SECOND ROW: commit → launch → return ═══ -->
  <line x1="730" y1="145" x2="730" y2="170" stroke="#6366f1" stroke-width="2"/>
  <line x1="730" y1="170" x2="570" y2="170" stroke="#6366f1" stroke-width="2"/>

  <rect x="440" y="155" width="130" height="35" rx="8" fill="#1e1e3f" stroke="#334155" stroke-width="1"/>
  <text x="505" y="177" text-anchor="middle" fill="#e2e8f0" font-size="11">git commit + push</text>

  <line x1="440" y1="172" x2="400" y2="172" stroke="#6366f1" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="260" y="155" width="140" height="35" rx="8" fill="none" stroke="url(#green)" stroke-width="2"/>
  <text x="330" y="177" text-anchor="middle" fill="#34d399" font-size="11" font-weight="600">Launch experiment</text>

  <line x1="260" y1="172" x2="218" y2="172" stroke="#10b981" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="60" y="155" width="158" height="35" rx="8" fill="none" stroke="#334155" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="139" y="177" text-anchor="middle" fill="#94a3b8" font-size="11">Return → start next idea</text>

  <!-- Divider -->
  <line x1="40" y1="210" x2="760" y2="210" stroke="#334155" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="400" y="234" text-anchor="middle" fill="#64748b" font-size="11" font-weight="600" letter-spacing="2">PARALLEL ITERATIONS</text>

  <!-- Terminal mockup -->
  <rect x="60" y="252" width="680" height="210" rx="8" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <circle cx="80" cy="268" r="5" fill="#f85149"/>
  <circle cx="96" cy="268" r="5" fill="#e3b341"/>
  <circle cx="112" cy="268" r="5" fill="#3fb950"/>
  <text x="156" y="272" fill="#484f58" font-size="11">claude</text>

  <!-- Specific idea (no papers) -->
  <text x="80" y="296" fill="#8b949e" font-size="11.5" font-family="monospace">❯</text>
  <text x="96" y="296" fill="#c9d1d9" font-size="11.5" font-family="monospace">/idea-iter add attention gates to decoder</text>
  <text x="80" y="314" fill="#94a3b8" font-size="10.5" font-family="monospace">  Specific idea → skipping paper search</text>
  <text x="80" y="330" fill="#fbbf24" font-size="10.5" font-family="monospace">  Plan: add attention gates at skip connections. Proceed? [Yes]</text>
  <text x="530" y="330" fill="#3fb950" font-size="11.5" font-family="monospace">→ iter 1 launched</text>

  <!-- Exploratory idea (with papers) -->
  <text x="80" y="356" fill="#8b949e" font-size="11.5" font-family="monospace">❯</text>
  <text x="96" y="356" fill="#c9d1d9" font-size="11.5" font-family="monospace">/idea-iter improve model generalization</text>
  <text x="80" y="374" fill="#94a3b8" font-size="10.5" font-family="monospace">  Exploratory → found 10 papers → proposing: mixup augmentation</text>
  <text x="80" y="390" fill="#fbbf24" font-size="10.5" font-family="monospace">  Plan: add mixup in data loader. Proceed? [Yes]</text>
  <text x="530" y="390" fill="#3fb950" font-size="11.5" font-family="monospace">→ iter 2 launched</text>

  <!-- Auto mode -->
  <text x="80" y="416" fill="#8b949e" font-size="11.5" font-family="monospace">❯</text>
  <text x="96" y="416" fill="#c9d1d9" font-size="11.5" font-family="monospace">/idea-iter --auto increase LR to 3e-4</text>
  <text x="530" y="416" fill="#3fb950" font-size="11.5" font-family="monospace">→ iter 3 launched</text>

  <!-- Check -->
  <text x="80" y="444" fill="#8b949e" font-size="11.5" font-family="monospace">❯</text>
  <text x="96" y="444" fill="#58a6ff" font-size="11.5" font-family="monospace">/check-experiments</text>
  <text x="530" y="444" fill="#e3b341" font-size="11.5" font-family="monospace">→ results collected</text>
</svg>
